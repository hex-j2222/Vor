name: Nebula Editor — CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

# ══════════════════════════════════════════════════════════════
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      # ── Generate gradlew without needing it in repo ────────
      - name: Download Gradle 8.6 and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          /opt/gradle/gradle-8.6/bin/gradle wrapper \
              --gradle-version=8.6 \
              --distribution-type=bin \
              --project-dir=$(pwd)
          chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v1-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: v1-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

# ══════════════════════════════════════════════════════════════
  build-release:
    name: Release APK + AAB
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Download Gradle 8.6 and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          /opt/gradle/gradle-8.6/bin/gradle wrapper \
              --gradle-version=8.6 \
              --distribution-type=bin \
              --project-dir=$(pwd)
          chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v1-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: v1-gradle-

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > nebula-release.keystore

      - name: Build Release APK
        env:
          STORE_PASS: ${{ secrets.STORE_PASS }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEY_PASS }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/nebula-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --no-daemon --stacktrace

      - name: Build Release AAB
        env:
          STORE_PASS: ${{ secrets.STORE_PASS }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
          KEY_PASS:   ${{ secrets.KEY_PASS }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/nebula-release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --no-daemon --stacktrace

      - name: Collect outputs
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          mkdir -p release_out
          for F in app/build/outputs/apk/release/*.apk; do
            [ -f "$F" ] && cp "$F" "release_out/NebulaEditor-v${VER}-$(basename $F)"
          done
          [ -f app/build/outputs/bundle/release/app-release.aab ] && \
            cp app/build/outputs/bundle/release/app-release.aab \
               "release_out/NebulaEditor-v${VER}.aab"
          ls -lh release_out/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release_out/
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_out/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
